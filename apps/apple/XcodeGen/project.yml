name: InfoMatrix
options:
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0
settings:
  base:
    SWIFT_VERSION: 6.0

targets:
  InfoMatrixShell:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ../Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.infomatrix.shell
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - framework: ../Frameworks/InfoMatrixCore.xcframework
        embed: false

  InfoMatrixShellTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../Tests/InfoMatrixShellTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: InfoMatrixShell

  InfoMatrix-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Shared
      - path: ../macOS/App/NotificationDeliveryCoordinator.swift
      - path: ../macOS/XcodeApp/MacApp.swift
    resources:
      - path: ../Resources/macOS/Assets.xcassets
      - path: ../Resources/PrivacyInfo.xcprivacy
    dependencies:
      - framework: ../Frameworks/InfoMatrixCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.infomatrix.reader.macos
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: InfoMatrix
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  InfoMatrix-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ../Shared
      - path: ../iOS/XcodeApp/iOSApp.swift
    resources:
      - path: ../Resources/iOS/Assets.xcassets
      - path: ../Resources/PrivacyInfo.xcprivacy
    dependencies:
      - framework: ../Frameworks/InfoMatrixCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.infomatrix.reader.ios
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: InfoMatrix
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  InfoMatrix-iPadOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ../Shared
      - path: ../iPadOS/XcodeApp/iPadApp.swift
    resources:
      - path: ../Resources/iOS/Assets.xcassets
      - path: ../Resources/PrivacyInfo.xcprivacy
    dependencies:
      - framework: ../Frameworks/InfoMatrixCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.infomatrix.reader.ipad
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_KEY_CFBundleDisplayName: InfoMatrix
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  InfoMatrix-macOS:
    build:
      targets:
        InfoMatrix-macOS: all
  InfoMatrix-iOS:
    build:
      targets:
        InfoMatrix-iOS: all
  InfoMatrix-iPadOS:
    build:
      targets:
        InfoMatrix-iPadOS: all
  InfoMatrixShellTests:
    build:
      targets:
        InfoMatrixShellTests: all
    test:
      targets:
        - InfoMatrixShellTests
