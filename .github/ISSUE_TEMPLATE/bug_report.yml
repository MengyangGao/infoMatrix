name: Bug Report
description: Report a problem or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iOS
        - Windows
        - Linux
        - Android
        - Rust Core / FFI
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: InfoMatrix Version
      placeholder: e.g., 0.1.1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide minimal steps to trigger the issue.
      placeholder: |
        1. Open the app
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: logs
    attributes:
      label: Logs / Console Output
      description: Paste any relevant logs or error messages.
      render: shell
